name: Auto-Sync Latest Fastfetch Logos

on:
  schedule:
    # Runs at 00:00 every Sunday
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  update-submodule:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Regenerate logos.ts
        run: npm run prebuild

      - name: Format generated files
        run: npm run format || true

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(fastfetch): sync latest upstream logos'
          title: 'Auto-sync latest fastfetch logos'
          body: |
            Automatically pulled the latest `fastfetch` upstream changes and regenerated `src/logos.ts` to include any new OS ASCII arts or color palette fixes.
          branch: auto-update-fastfetch
          labels: dependencies, automated pr
